# fly.toml app configuration file generated for syncvision on 2026-06-12T19:01:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'syncvision'
primary_region = 'ord'

[build]

[deploy]
  release_command = "sh -c 'cd /app/apps/backend && npx prisma migrate deploy'"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = "audio_data"
  destination = "/app/audio"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
