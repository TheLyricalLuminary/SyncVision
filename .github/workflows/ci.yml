name: Strict CI Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/syncvision_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Install backend deps
        working-directory: apps/backend
        run: npm install

      - name: Generate Prisma client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Typecheck backend
        working-directory: apps/backend
        run: npx tsc --noEmit

      - name: Backend Tests
        working-directory: apps/backend
        run: npm run test

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Build Frontend
        working-directory: apps/frontend
        run: npm run build
        env:
          VITE_API_URL: ''
          VITE_APP_URL: ''
