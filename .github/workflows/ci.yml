name: Strict CI Gate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: apps/backend
        run: npm install

      - name: Typecheck backend
        working-directory: apps/backend
        run: npx tsc --noEmit

      - name: Backend Tests
        working-directory: apps/backend
        run: npm run test

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm install

      - name: Build Frontend
        working-directory: apps/frontend
        run: npm run build
