# fly.toml app configuration file generated for syncvision-frontend on 2026-06-12T14:56:33-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'syncvision-frontend'
primary_region = 'ewr'

[build]
  dockerfile = 'apps/frontend/Dockerfile'

  [build.args]
    VITE_API_URL = 'https://syncvision.fly.dev'
    VITE_APP_URL = 'https://syncvision-frontend.fly.dev'

[http_service]
  internal_port = 4173
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
